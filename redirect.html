<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>二维码验证</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f2f2f2;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .box {
      text-align: center;
      padding: 40px 20px;
      width: 100%;
      max-width: 340px;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #ff4d4f;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .icon::before {
      content: '!';
      color: white;
      font-size: 48px;
      font-weight: bold;
      line-height: 1;
    }
    .title {
      font-size: 18px;
      color: #333;
      margin-bottom: 24px;
    }
    .message {
      font-size: 15px;
      color: #666;
      line-height: 1.6;
    }
    .jump {
      color: #1890ff;
      font-size: 14px;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="box" id="box">
    <div class="icon"></div>
    <h1 class="title">二维码已失效</h1>
    <p class="message">二维码已过期，联系客户经理重新获取</p>
  </div>
  <script>
    var params = new URLSearchParams(location.search);
    var targetUrl = params.get('url');
    var expire = parseInt(params.get('expire'), 10);

    if (targetUrl && !isNaN(expire)) {
      if (Date.now() < expire) {
        var decoded = decodeURIComponent(targetUrl);
        document.getElementById('box').innerHTML =
          '<p class="message" style="margin-top:20px;">正在跳转，请稍候...</p>';
        location.href = decoded;
      }
    } else {
      document.querySelector('.message').textContent = '链接参数错误';
    }
  </script>
</body>
</html>
